name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Demo benchmarks (no Vertex)
        run: npm run eval:extract

      - name: API integration tests (demo mode)
        env:
          LEXGUARD_DEMO_MODE: 'true'
          LEXGUARD_MEMORY_STORE: 'true'
          LEXGUARD_LLM_EXTRACT: 'false'
        run: npm run test:integration

      - name: Build frontend
        run: npm run build

      - name: Production server smoke
        env:
          PORT: '19080'
        run: node scripts/ci-smoke.js
