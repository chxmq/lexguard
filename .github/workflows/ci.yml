name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Verify production server starts
        env:
          NODE_ENV: production
          LEXGUARD_DEMO_MODE: 'true'
          PORT: '8080'
        run: |
          timeout 8 node src/server/index.js &
          sleep 2
          curl -sf http://127.0.0.1:8080/api/health | grep -q '"status":"ok"'
