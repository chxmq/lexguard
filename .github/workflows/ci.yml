name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Demo benchmarks (no Vertex)
        run: npm run eval:extract

      - name: API integration tests (demo mode)
        env:
          LEXGUARD_DEMO_MODE: 'true'
          LEXGUARD_MEMORY_STORE: 'true'
          LEXGUARD_LLM_EXTRACT: 'false'
        run: npm run test:integration

      - name: Build frontend
        run: npm run build

      - name: Production server smoke
        env:
          NODE_ENV: production
          LEXGUARD_DEMO_MODE: 'true'
          LEXGUARD_MEMORY_STORE: 'true'
          PORT: '8080'
        run: |
          timeout 12 node src/server/index.js &
          sleep 2
          curl -sf http://127.0.0.1:8080/api/health | grep -q '"status":"ok"'
          curl -sf http://127.0.0.1:8080/api/health | grep -q '"demoMode":true'
